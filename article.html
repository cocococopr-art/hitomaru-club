<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>記事｜HITOMARU CLUB</title>
  <meta name="description" content="HITOMARU CLUB — 日記・お知らせ・現場での学びを共有する社内ブログ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./index.html" aria-label="HITOMARU CLUB トップへ">
        <span class="brand-mark">H</span>
        <span class="brand-copy">
          <strong>HITOMARU&nbsp;CLUB</strong>
          <small>日記・お知らせ・現場の学び</small>
        </span>
      </a>
      <button
        id="menuButton"
        class="menu-button"
        type="button"
        aria-label="月別アーカイブを開く"
        aria-expanded="false"
        aria-controls="drawer"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="drawer" id="drawer" hidden>
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <nav class="drawer-panel" aria-label="月別アーカイブ">
      <div class="drawer-head">
        <p class="drawer-title">ARCHIVE<small>月別に見返す</small></p>
        <button id="drawerClose" class="drawer-close" type="button" aria-label="メニューを閉じる">×</button>
      </div>
      <ul class="month-list" id="monthList">
        <li class="month-loading">読み込み中…</li>
      </ul>
    </nav>
  </div>

  <main class="article-page">
    <a class="back-link" href="./index.html">← 記事一覧へ戻る</a>
    <article id="articleContent">
      <div class="loading">記事を読み込んでいます。</div>
    </article>
  </main>

  <footer class="site-footer"><p>© HITOMARU CLUB</p></footer>
  <script src="./script.js"></script>
</body>
</html>
